name: yuanjing-trade

services:
  backend-a:
    platform: linux/amd64
    build:
      context: ./backend
    environment:
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-dev-only-change-me}
      DATABASE_URL: sqlite+aiosqlite:////app/.data/yuanjing.db
      SEED_DEMO_DATA: "false"
    volumes:
      - ./backend/.data:/app/.data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  backend-b:
    platform: linux/amd64
    build:
      context: ./backend
    environment:
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-dev-only-change-me}
      DATABASE_URL: sqlite+aiosqlite:////app/.data/yuanjing.db
      SEED_DEMO_DATA: "false"
    volumes:
      - ./backend/.data:/app/.data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
    expose:
      - "80"
    depends_on:
      - backend-a
      - backend-b

  nginx:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/nginx:1.29-alpine
    platform: linux/amd64
    entrypoint: ["nginx", "-g", "daemon off;"]
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-a:
        condition: service_healthy
      backend-b:
        condition: service_healthy
      frontend:
        condition: service_started
